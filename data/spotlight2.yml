title : "Fair Use Policy"
id: "second"
content: |
  In order to provide the IPFS.io gateway service to the community, we need to ensure that bad actors can't abuse this service in such a way that makes it unsustainable to continue offering it. One such example of this is using the gateway for vast amounts of data, that quickly becomes costly and unsustainable.
